<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClaudeVille - Agent Visualization</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/topbar.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/character.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <!-- 상단바 -->
    <header id="topbar" class="topbar">
        <div class="topbar__left">
            <span class="topbar__logo">ClaudeVille</span>
            <span class="topbar__version">v0.1</span>
        </div>
        <div class="topbar__center">
            <div class="topbar__stat">
                <span data-i18n="tokens" class="topbar__stat-label">토큰</span>
                <span id="statTokens" class="topbar__stat-value">0</span>
            </div>
            <div class="topbar__stat">
                <span data-i18n="cost" class="topbar__stat-label">비용</span>
                <span id="statCost" class="topbar__stat-value">$0.0000</span>
            </div>
            <div class="topbar__stat">
                <span data-i18n="time" class="topbar__stat-label">시간</span>
                <span id="statTime" class="topbar__stat-value">00:00:00</span>
            </div>
            <div class="topbar__badges">
                <span class="topbar__badge topbar__badge--working">
                    <span class="topbar__badge-dot"></span>
                    <span id="badgeWorking">0</span> <span data-i18n="working">작업중</span>
                </span>
                <span class="topbar__badge topbar__badge--idle">
                    <span class="topbar__badge-dot"></span>
                    <span id="badgeIdle">0</span> <span data-i18n="idle">대기</span>
                </span>
                <span class="topbar__badge topbar__badge--waiting">
                    <span class="topbar__badge-dot"></span>
                    <span id="badgeWaiting">0</span> <span data-i18n="waiting">응답대기</span>
                </span>
            </div>
        </div>
        <div class="topbar__right">
            <button id="btnModeCharacter" data-i18n="world" class="topbar__mode-btn topbar__mode-btn--active">월드</button>
            <button id="btnModeDashboard" data-i18n="dashboard" class="topbar__mode-btn">대시보드</button>
            <button id="btnSettings" class="topbar__settings-btn" title="설정">&#9881;</button>
        </div>
    </header>

    <!-- 메인 영역 -->
    <div class="main">
        <!-- 상단: 사이드바 + 콘텐츠 -->
        <div class="main__body">
            <!-- 사이드바 -->
            <aside id="sidebar" class="sidebar">
                <div class="sidebar__header">
                    <span data-i18n="agents" class="sidebar__title">에이전트</span>
                    <span id="agentCount" class="sidebar__count">0</span>
                </div>
                <div id="agentList" class="sidebar__list">
                    <!-- 에이전트 항목이 동적으로 추가됨 -->
                </div>
            </aside>

            <!-- 메인 콘텐츠 -->
            <div class="content">
                <!-- 캐릭터 모드 -->
                <div id="characterMode" class="content__character">
                    <canvas id="worldCanvas" class="content__canvas"></canvas>
                </div>

                <!-- 대시보드 모드 -->
                <div id="dashboardMode" class="content__dashboard" style="display: none;">
                    <div id="dashboardGrid" class="dashboard__grid">
                        <!-- 에이전트 카드가 동적으로 추가됨 -->
                    </div>
                    <div id="dashboardEmpty" class="dashboard__empty">
                        <span class="dashboard__empty-icon">~</span>
                        <span data-i18n="noActiveAgents" class="dashboard__empty-text">활성 에이전트 없음</span>
                        <span data-i18n="noActiveAgentsSub" class="dashboard__empty-sub">Claude Code 세션을 시작하면 여기에 표시됩니다</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 에이전트 상세 패널 (main 안에서 flex로 배치) -->
        <div id="agentDetail" class="agent-detail" style="display: none;">
        <div class="agent-detail__header">
            <span id="detailName" class="agent-detail__name"></span>
            <span id="detailStatus" class="agent-detail__status"></span>
            <button id="detailClose" class="agent-detail__close">X</button>
        </div>
        <div class="agent-detail__body">
            <div class="agent-detail__row">
                <span data-i18n="model" class="agent-detail__label">모델</span>
                <span id="detailModel" class="agent-detail__value"></span>
            </div>
            <div class="agent-detail__row">
                <span data-i18n="role" class="agent-detail__label">역할</span>
                <span id="detailRole" class="agent-detail__value"></span>
            </div>
            <div class="agent-detail__row">
                <span data-i18n="tokens" class="agent-detail__label">토큰</span>
                <span id="detailTokens" class="agent-detail__value"></span>
            </div>
            <div class="agent-detail__row">
                <span data-i18n="cost" class="agent-detail__label">비용</span>
                <span id="detailCostValue" class="agent-detail__value"></span>
            </div>
            <div class="agent-detail__row">
                <span data-i18n="team" class="agent-detail__label">팀</span>
                <span id="detailTeam" class="agent-detail__value"></span>
            </div>
            <div id="detailMessage" class="agent-detail__message"></div>
        </div>
    </div>
    </div>

    <!-- 모달 컨테이너 -->
    <div id="modalOverlay" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal__header">
                <span id="modalTitle" class="modal__title"></span>
                <button id="modalClose" class="modal__close">X</button>
            </div>
            <div id="modalContent" class="modal__content"></div>
        </div>
    </div>

    <!-- 토스트 컨테이너 -->
    <div id="toastContainer" class="toast-container"></div>

    <script type="module" src="src/presentation/App.js"></script>
</body>
</html>
