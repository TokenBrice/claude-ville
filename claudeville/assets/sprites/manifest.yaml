# ─── BUILDINGS ───────────────────────────────────────────────────────────────
# All buildings are single-image PNGs (buildings/<id>/base.png) per the building
# style contract (docs/building-style-contract.md): true 2:1 iso, slate-blue roofs,
# baked grass-cobble/stone/water iso base (nothing floats), ≤400px. composeGrid is
# retired. Overlay layers (watchfire/banner/beacon/portalGlow) sit beside base.png.

buildings:
  # ── HERO: Command Center ── (single-image; was composeGrid [3,2], converted losslessly)
  - id: building.command
    tool: map_object
    prompt: "epic command center castle keep, grand stone walls with arched gates, dual dragon banners on parapets, golden flame torches, imposing isometric fortress, on a square isometric grass-and-cobblestone base tile"
    splitForOcclusion: true
    horizonY: 130
    layers:
      watchfire:
        tool: isometric_tile
        prompt: "roaring golden watchfire on stone brazier, dancing flame, transparent background, isometric"
        size: 64
        anchor: [40, 52]
        animation: pulse
      banner:
        tool: isometric_tile
        prompt: "dragon war banner swaying in wind, deep crimson with gold sigil, transparent background, isometric"
        size: 64
        anchor: [96, 24]
        animation: pulse
    emitters:
      torch: [64, 28]
      torch2: [176, 28]
      torch3: [64, 140]
      torch4: [176, 140]
      sparkle: [120, 18]
      sparkle2: [200, 18]
    # Phase 2.5.5: light-reflection compositing reads these to additively
    # tint nearby water tiles. Anchor is sprite-local pixels.
    lightSource: [120, 30]
    lightColor: '#ffcc66'
    lightRadius: 80

  # ── HERO: Harbor Lighthouse (watchtower) ──
  # Single-image (was composeGrid [4,3]); narrow/tall Pharos per the building
  # style contract. Beacon flame is the procedural _drawWatchtowerFire +
  # beacon.png overlay anchored at the dark lantern crown (144,68).
  - id: building.watchtower
    tool: map_object
