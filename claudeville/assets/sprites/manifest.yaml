# ─── BUILDINGS ───────────────────────────────────────────────────────────────
# All buildings are single-image PNGs (buildings/<id>/base.png) per the building
# style contract (docs/building-style-contract.md): true 2:1 iso, slate-blue roofs,
# structure-only land art or a named structural platform exception, ≤400px.
# Terrain aprons are baked into the static world cache. Overlay layers
# (watchfire/banner/beacon/portalGlow) sit beside base.png.

buildings:
  # ── HERO: Command Center ── (single-image; was composeGrid [3,2], converted losslessly)
  - id: building.command
    tool: map_object
    prompt: "epic command center castle keep, grand stone walls with arched gates, dual dragon banners on parapets, golden flame torches, imposing isometric fortress with a flat irregular cobble threshold broken by grass intrusions; no raised slab, plinth, retaining lip, complete perimeter, or baked cast shadow"
    width: 312
    height: 208
    anchor: [156, 182]
    splitForOcclusion: true
    horizonY: 130
    # 0.1 (visual-quality plan): the banner layer was a block-cube mis-generation
