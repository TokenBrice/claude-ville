    prompt: "epic high-fantasy Claude Opus archmage scholar, ivory and amber robes, broad gold rune mantle, high collar, glowing tome, short staff, strong readable RPG silhouette, 8-direction pixel art"
    n_directions: 8
    size: 92
    animations: [walk, breathing-idle]
    palette_layer: claude
    anchor: [46, 80]

  - id: agent.claude.sonnet
    tool: create_character
    prompt: "epic high-fantasy Claude Sonnet scribe mage, amber scholar cloak, silver quill, open tome, nimble readable RPG silhouette, 8-direction pixel art"
    n_directions: 8
    size: 92
    animations: [walk, breathing-idle]
    palette_layer: claude
    anchor: [46, 80]

  - id: agent.codex.gpt55
