style:
  assetVersion: "2026-07-12-fortified-boundary-v1"
  anchor: "epic high-fantasy pixel art, dramatic lighting, painterly palette, crisp pixel edges, no anti-aliasing, heroic silhouettes, faint magical glow on landmarks"

# ─── CHARACTERS ──────────────────────────────────────────────────────────────
# Character sheets are 8 direction columns by 10 animation rows:
# 6 walk rows followed by 4 breathing-idle rows, with 92px square cells.
# Optional `required_equipment` entries are validated in every walk and idle
# cell for baked-equipment characters. Prefer runtime equipment overlays when
# pose consistency matters across generated animation frames.
characters:
  # NOTE: generated 2026-06-11 with mode=pro, size=76 (canvas 148px, crop to 92px).
  # Pro mode is what fixed cross-direction consistency (standard mode produced
  # different outfits per angle). If regenerating: pass size=76 to keep the
  # star-crown inside the cell, and avoid ambiguous color language like
  # "shifting violet to gold" — it caused per-angle palette flips.
  - id: agent.claude.fable
    tool: create_character
    prompt: "Claude Fable transcendent mythweaver sovereign, legendary female storyteller-archmage who outranks all other arcane masters, floor-length ivory and royal crimson ceremonial robe with ornate gold filigree, deep violet starfield cloak with gold constellation embroidery hanging from her shoulders, long flowing platinum starlit hair, radiant golden star-crown resting firmly on her head, glowing ancient storybook clasped at her chest, luminous quill-tipped staff held upright close to her body, soft golden constellation motes near her shoulders, compact majestic old-school RPG sorceress, identical outfit and colors from every viewing angle, no wings, no horns, no revealing outfit"
    n_directions: 8
    size: 92
    animations: [walk, breathing-idle]
    palette_layer: claude
    anchor: [46, 80]
    mode: pro

  # NOTE: regenerate via pixellab create_character with size=76 (canvas ~108) to
  # keep the tall hood silhouette inside the 92-px engine cell. The manifest `size: 92`
  # below is the engine cell size, not the generation hint.
  - id: agent.claude.opus
