    # so the layer is retired rather than rebaked.
    layers:
      watchfire:
        tool: isometric_tile
        prompt: "isolated roaring golden watchfire flame in a small stone brazier bowl, dancing amber-orange pixel flames with warm ember sparks, thin tile, transparent background only, no ground tile, no square base, no platform, no cube block, empty transparent corners"
