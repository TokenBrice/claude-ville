# ─── BUILDINGS ───────────────────────────────────────────────────────────────
# HERO buildings: composeGrid [3,2] = 3 cols × 2 rows of 104px cells → 312×208 composed.
# The harbor Pharos uses [4,3] so it reads as a true sea landmark at full-map zoom.
# STANDARD buildings: single 96-112px isometric tile.

buildings:
  # ── HERO: Command Center ──
  - id: building.command
    composeGrid: [3, 2]
    splitForOcclusion: true
    horizonY: 130
    layers:
      base:
        tool: isometric_tile
        prompt: "epic command center castle keep, grand stone walls with arched gates, dual dragon banners on parapets, golden flame torches, imposing isometric fortress"
        size: 64
        displaySize: 104
      watchfire:
        tool: isometric_tile
        prompt: "roaring golden watchfire on stone brazier, dancing flame, transparent background, isometric"
        size: 64
        anchor: [40, 52]
        animation: pulse
      banner:
        tool: isometric_tile
        prompt: "dragon war banner swaying in wind, deep crimson with gold sigil, transparent background, isometric"
        size: 64
        anchor: [96, 24]
        animation: pulse
    emitters:
      torch: [64, 28]
      torch2: [176, 28]
      torch3: [64, 140]
      torch4: [176, 140]
      sparkle: [120, 18]
      sparkle2: [200, 18]
    # Phase 2.5.5: light-reflection compositing reads these to additively
    # tint nearby water tiles. Anchor is sprite-local pixels.
    lightSource: [120, 30]
    lightColor: '#ffcc66'
    lightRadius: 80

  # ── HERO: Harbor Lighthouse (watchtower) ──
  - id: building.watchtower
    composeGrid: [4, 3]
    splitForOcclusion: true
    horizonY: 198
    layers:
      base:
        tool: isometric_tile
        prompt: "Great Lighthouse of Alexandria Pharos, white limestone square podium, tapering stacked tower stages, bronze lantern crown, attached stone quay and narrow causeway, heroic isometric harbor landmark, dramatic warm dawn light"
        size: 64
        displaySize: 100
      beacon:
        tool: isometric_tile
        prompt: "warm golden beacon from Pharos lantern crown, soft rotating beam suggestion, transparent background, isometric"
        size: 64
        anchor: [196, 42]
        animation: pulse
    emitters:
      torch: [196, 32]
    # Phase 2.5.5: light-reflection compositing reads these to additively
    # tint nearby water tiles. Anchor is sprite-local pixels.
    lightSource: [196, 32]
    lightColor: '#ffe066'
    lightRadius: 120

  # ── HERO: Research Observatory ──
  - id: building.observatory
    composeGrid: [3, 2]
    splitForOcclusion: true
    horizonY: 130
    layers:
      base:
        tool: isometric_tile
        prompt: "epic research observatory, domed copper roof with star etchings, tall arched windows glowing starlight blue, stone turret, isometric"
        size: 64
        displaySize: 104
      astrolabe:
        tool: isometric_tile
        prompt: "brass astrolabe ring rotating above dome, star sparkle, transparent background, isometric"
        size: 64
        anchor: [144, 20]
        animation: pulse
    emitters:
      sparkle: [144, 18]
    # Phase 2.5.5: light-reflection compositing reads these to additively
    # tint nearby water tiles. Anchor is sprite-local pixels.
    lightSource: [144, 20]
    lightColor: '#aaccff'
    lightRadius: 60

  # ── HERO: Portal Gate ──
  - id: building.portal
    composeGrid: [3, 2]
    splitForOcclusion: true
    horizonY: 130
    layers:
      base:
        tool: isometric_tile
        prompt: "epic portal gate archway, ancient stone arch with swirling arcane energy, violet and gold runes, massive scale, isometric"
        size: 64
        displaySize: 104
      portalGlow:
        tool: isometric_tile
        prompt: "swirling violet portal vortex energy, arcane rune ring, transparent background, isometric"
        size: 64
        anchor: [144, 60]
        animation: pulse
    emitters:
      sparkle: [144, 60]
      sparkle2: [120, 80]
    # Phase 2.5.5: light-reflection compositing reads these to additively
    # tint nearby water tiles. Anchor is sprite-local pixels.
    lightSource: [144, 60]
    lightColor: '#cc99ff'
    lightRadius: 70

  # ── STANDARD: Code Forge ──
  - id: building.forge
    tool: isometric_tile
    prompt: "epic code forge smithy, glowing forge mouth with molten amber light, iron chimney stack billowing smoke, rune-inscribed anvil visible through arched doorway, isometric"
    size: 64
    displaySize: 112
    emitters:
      smoke: [88, 12]
      mining: [40, 80]
      sparkle: [70, 90]

  # ── STANDARD: Token Mine ──
  - id: building.mine
    tool: isometric_tile
    prompt: "epic token mine entrance, reinforced timber pit-head frame, cart tracks leading inside, lantern hung at mouth, veins of glowing ore in stone, isometric"
    size: 64
    displaySize: 112
    emitters:
      sparkle: [60, 70]
      mining: [80, 92]

  # ── STANDARD: Task Board ──
  - id: building.taskboard
    tool: isometric_tile
    prompt: "epic task board hall, open-sided pavilion with carved stone pillars, scrolls and parchment notices pinned to boards, guild pennant flying, isometric"
    size: 64
    displaySize: 112

  # ── STANDARD: City Hall (chat/council destination) ──
  - id: building.chathall
    tool: isometric_tile
    prompt: "epic fantasy city hall council house, steep slate roof, messenger balcony, civic banner, warm assembly windows, carved speech-rune above arched doorway, isometric"
    size: 64
    displaySize: 112
    emitters:
      sparkle: [88, 24]

  # ── STANDARD: Lore Archive ──
  - id: building.archive
    tool: isometric_tile
    prompt: "epic lore archive library, tall narrow windows of stained glass, shelves of tomes visible inside, carved stone lintel with open book motif, isometric"
    size: 64
    displaySize: 112

  # ── STANDARD: Prompt Alchemy ──
  - id: building.alchemy
    tool: isometric_tile
    prompt: "epic prompt alchemy workshop, bubbling cauldron visible through round window, strange vapours drifting from vent, arcane ingredient jars stacked outside, isometric"
    size: 64
    displaySize: 96
    emitters:
      sparkle: [64, 80]

  # ── STANDARD: Idle Sanctuary ──
  - id: building.sanctuary
    tool: isometric_tile
    prompt: "epic idle sanctuary chapel, serene stone walls with ivy, glowing peaceful rune above door, soft golden light from within, isometric"
    size: 64
    displaySize: 96

