# ─── CHARACTERS ──────────────────────────────────────────────────────────────
# Character sheets are 8 direction columns by 10 animation rows:
# 6 walk rows followed by 4 breathing-idle rows, with 92px square cells.
# Optional `required_equipment` entries are validated in every walk and idle
# cell for baked-equipment characters. Prefer runtime equipment overlays when
# pose consistency matters across generated animation frames.
characters:
  # NOTE: regenerate via pixellab create_character with size=76 (canvas ~108) to
  # keep the tall hood silhouette inside the 92-px engine cell. The manifest `size: 92`
  # below is the engine cell size, not the generation hint.
  - id: agent.claude.opus
    tool: create_character
    prompt: "Claude Opus female accomplished arcane master, long silver-white hair, ivory and midnight-blue ceremonial robe, ornate gold and copper arcane trim, rune-embroidered mantle, wide celestial archmage hat, crystal-topped staff held close to body, subtle luminous aura and floating motes near shoulders, regal old-school RPG master sorceress silhouette, no wings, no horns, no tail, no demon, no succubus, no revealing outfit"
    n_directions: 8
    size: 92
    animations: [walk, breathing-idle]
    palette_layer: claude
    anchor: [46, 80]
    mode: pro

  - id: agent.claude.sonnet
    tool: create_character
    prompt: "Claude Sonnet female mid-tier wizard, deep violet and cobalt robes with silver rune trim, shorter pointed wizard hat below top margin, star-lined cloak, crystal-topped staff held tight inside silhouette, chained spellbook at belt, controlled blue-violet hand runes, robe hem fully visible above bottom margin, no pixels touching canvas edge, no wings, no angel armor, no warrior plate armor, no revealing outfit, elegant seasoned mage stance"
    n_directions: 8
    size: 92
    animations: [walk, breathing-idle]
    palette_layer: claude
    anchor: [46, 80]
    mode: pro

  - id: agent.claude.haiku
