# ─── CHARACTERS ──────────────────────────────────────────────────────────────
# Character sheets are 8 direction columns by 10 animation rows:
# 6 walk rows followed by 4 breathing-idle rows, with 92px square cells.
characters:
  # NOTE: regenerate via pixellab create_character with size=76 (canvas ~108) to
  # keep the tall hood silhouette inside the 92-px engine cell. The manifest `size: 92`
  # below is the engine cell size, not the generation hint.
  - id: agent.claude.opus
    tool: create_character
    prompt: "Claude Opus 4.7 ancient hooded archmage, oversized deep umber cowl, black shadow face with two glowing golden eyes, layered dark mantle, gold rune collar, full-length ivory and amber robe under a heavy cloak, hidden hands, small glowing grimoire, regal mystic silhouette, no pointed hat, no staff, no grass base, no platform, 8-direction pixel art"
