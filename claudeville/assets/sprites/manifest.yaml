# ─── BUILDINGS ───────────────────────────────────────────────────────────────
# HERO buildings: composeGrid [3,2] = 3 cols × 2 rows of 104px cells → 312×208 composed.
# The harbor Pharos uses [4,3] so it reads as a true sea landmark at full-map zoom.
# STANDARD buildings: single 96-112px isometric tile.

buildings:
  # ── HERO: Command Center ──
  - id: building.command
    composeGrid: [3, 2]
    splitForOcclusion: true
    horizonY: 130
    layers:
      base:
        tool: isometric_tile
        prompt: "epic command center castle keep, grand stone walls with arched gates, dual dragon banners on parapets, golden flame torches, imposing isometric fortress"
        size: 64
        displaySize: 104
      watchfire:
        tool: isometric_tile
        prompt: "roaring golden watchfire on stone brazier, dancing flame, transparent background, isometric"
        size: 64
        anchor: [40, 52]
        animation: pulse
      banner:
        tool: isometric_tile
        prompt: "dragon war banner swaying in wind, deep crimson with gold sigil, transparent background, isometric"
        size: 64
        anchor: [96, 24]
        animation: pulse
    emitters:
      torch: [64, 28]
      torch2: [176, 28]
      torch3: [64, 140]
      torch4: [176, 140]
      sparkle: [120, 18]
      sparkle2: [200, 18]
    # Phase 2.5.5: light-reflection compositing reads these to additively
    # tint nearby water tiles. Anchor is sprite-local pixels.
    lightSource: [120, 30]
    lightColor: '#ffcc66'
    lightRadius: 80

  # ── HERO: Harbor Lighthouse (watchtower) ──
  - id: building.watchtower
    composeGrid: [4, 3]
    splitForOcclusion: true
    horizonY: 198
    layers:
      base:
        tool: isometric_tile
        prompt: "Great Lighthouse of Alexandria Pharos, white limestone square podium, tapering stacked tower stages, bronze lantern crown, attached stone quay and narrow causeway, heroic isometric harbor landmark, dramatic warm dawn light"
        size: 64
        displaySize: 100
      beacon:
        tool: isometric_tile
        prompt: "open brazier fire in the Pharos lantern crown, orange amber flame, warm magical glow, no modern beam, transparent background, isometric"
        size: 64
        anchor: [196, 42]
        animation: pulse
    emitters:
      torch: [196, 32]
    # Phase 2.5.5: light-reflection compositing reads these to additively
    # tint nearby water tiles. Anchor is sprite-local pixels.
    lightSource: [196, 32]
    lightColor: '#ffb347'
    lightRadius: 96
    lightOverlay: 'atmosphere.light.fire-glow'

  # ── STANDARD: Harbor Master (commit ships / push departures) ──
  - id: building.harbor
    tool: isometric_tile
    prompt: "fantasy RPG wooden harbor dock landmark, weathered timber quay deck, angled dock fingers, stout mooring posts with rope coils, compact blue-roof harbor master's shack with warm glowing window, signal mast, timber loading crane with pulley, low crates and barrels, lanterns, nautical guild style, bold readable isometric RPG landmark, no large ship"
    anchor: [176, 196]
    splitForOcclusion: true
    horizonY: 142
    emitters:
      torch: [171, 96]
      signal: [74, 37]
    lightSource: [171, 96]
    lightColor: '#ffd37a'
    lightRadius: 96
    lightOverlay: 'atmosphere.light.lantern-glow'

  # ── HERO: Clock Observatory ──
  - id: building.observatory
    composeGrid: [3, 2]
    splitForOcclusion: true
    horizonY: 130
    layers:
      base:
        tool: map_object
        prompt: "scholarly stone clock tower observatory for a fantasy village, blue slate roof, copper-blue scholarly accents, large circular clock face on the front, no text, no logo, transparent background, low top-down isometric"
        size: 64
        displaySize: 104
    emitters:
      sparkle: [126, 62]
    # Phase 2.5.5: light-reflection compositing reads these to additively
    # tint nearby water tiles. Anchor is sprite-local pixels.
    lightSource: [126, 62]
    lightColor: '#9fd1ff'
    lightRadius: 58

  # ── HERO: Portal Gate ──
  - id: building.portal
    composeGrid: [3, 2]
    splitForOcclusion: true
    horizonY: 130
    layers:
      base:
        tool: isometric_tile
        prompt: "epic portal gate archway, ancient stone arch with swirling arcane energy, violet and gold runes, massive scale, isometric"
        size: 64
        displaySize: 104
      portalGlow:
        tool: isometric_tile
        prompt: "swirling violet portal vortex energy, arcane rune ring, transparent background, isometric"
        size: 64
        anchor: [144, 60]
        animation: pulse
    emitters:
      sparkle: [144, 60]
      sparkle2: [120, 80]
    # Phase 2.5.5: light-reflection compositing reads these to additively
    # tint nearby water tiles. Anchor is sprite-local pixels.
    lightSource: [144, 60]
    lightColor: '#cc99ff'
    lightRadius: 70

  # ── STANDARD: Code Forge ──
  - id: building.forge
    tool: isometric_tile
    prompt: "old-school 16-bit fantasy RPG isometric code forge landmark, compact soot-dark stone smithy with oversized glowing orange arched furnace mouth, tall black iron chimney with crown, red-orange timber canopy roof, rune anvil and forge tools outside, molten sparks, warm firelight, transparent background, strong readable silhouette, no sci-fi reactor, no generic house"
    size: 64
    displaySize: 112
    emitters:
      smoke: [39, 8]
      forgeEmber: [51, 66]
      forgeSpark: [50, 70]
      sparkle: [26, 76]
    lightSource: [51, 66]
    lightColor: '#ff8a33'
    lightRadius: 62
    lightOverlay: 'atmosphere.light.fire-glow'

  # ── STANDARD: Token Mine ──
  - id: building.mine
    tool: isometric_tile
    prompt: "old-school 16-bit fantasy RPG isometric token mine landmark, dark craggy mountain gate with heavy timber headframe and pulley wheel, amber-lit arched cave mouth, mine cart rails and small cart emerging, glowing blue token ore veins and crystal clusters, lanterns, rubble, moss, bold readable silhouette, transparent background, no sci-fi pod, no generic ruin"
    size: 64
    displaySize: 160
    emitters:
      sparkle: [94, 47]
      sparkle2: [34, 86]
      mining: [78, 122]
    lightSource: [73, 95]
    lightColor: '#ffb84d'
    lightRadius: 68
    lightOverlay: 'atmosphere.light.lantern-glow'

  # ── HERO: Task Board (Town Quest Board) ──
  - id: building.taskboard
    tool: map_object
    prompt: "fantasy RPG town task board landmark rotated toward the harbor sea, wooden quest notice board and signpost, broad timber board covered with parchment quest notes and colored wax seals on the seaward-facing side, crossed beams, blue slate roof cap, hanging lanterns, small guild pennants, arrow signposts, rope ties, stout posts on cobblestone-and-dirt base, cozy village square job board, bold readable isometric RPG landmark, no castle facade, no door, no large stone towers"
    size: 176
    displaySize: 176
    splitForOcclusion: true
    horizonY: 94
    emitters:
      torch: [48, 105]
      torch2: [128, 105]
      sparkle: [88, 74]
      sparkle2: [88, 48]
    # Phase 2.5.5: light-reflection compositing reads these to additively
    # tint nearby water tiles. Anchor is sprite-local pixels.
    lightSource: [88, 74]
    lightColor: '#ffb347'
    lightRadius: 80
    lightOverlay: 'atmosphere.light.fire-glow'

  # ── STANDARD: Lore Archive ──
  - id: building.archive
    tool: isometric_tile
    prompt: "old-school 16-bit fantasy RPG grand lore archive exterior, monumental stone fortress-library keep with two short bookend towers, tall central stained-glass arched window glowing gold-green, blue slate roof, carved open-book crest above entrance, scroll banners, broad stone steps, side buttresses, exterior scholarly castle landmark, no exposed interior wall, no giant bookshelf cutaway"
    anchor: [168, 196]
    splitForOcclusion: true
    horizonY: 145
    emitters:
      sparkle: [168, 82]
      sparkle2: [142, 128]
      sparkle3: [194, 128]
    lightSource: [168, 88]
    lightColor: '#b3d68c'
    lightRadius: 108
    lightOverlay: 'atmosphere.light.lantern-glow'

