<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320, initial-scale=1.0">
  <title>ClaudeVille Widget</title>
  <link rel="stylesheet" href="widget.css">
</head>
<body>
  <!-- Static resource surface kept bundled for browser/WebKit smoke checks; the Swift app currently renders equivalent popover HTML at runtime. -->
  <div class="widget" id="widget">

    <!-- Header -->
    <div class="header">
      <div class="header-title">ClaudeVille</div>
      <div class="stats-row">
        <div class="badges" id="badges">
          <div class="badge">
            <span class="badge-dot working"></span>
            <span id="working-count" class="badge-count">0</span>
            <span>working</span>
          </div>
          <div class="badge">
            <span class="badge-dot idle"></span>
            <span id="idle-count" class="badge-count">0</span>
            <span>idle</span>
          </div>
        </div>
        <div class="meta-stats">
          <span class="meta-tokens" id="total-tokens">0 tokens</span>
          <span class="meta-cost" id="total-cost">$0.00</span>
        </div>
      </div>
    </div>

    <!-- Account/quota section -->
    <div class="quota-section" id="quota-section">
      <div class="quota-info">
        <span id="quota-tier" class="quota-tier"></span>
        <span id="quota-activity" class="quota-activity"></span>
      </div>
      <div id="quota-bars" class="quota-bars" style="display: none;">
        <div class="quota-bar-row">
          <span class="quota-bar-label">5H</span>
          <div class="quota-bar-track">
            <div id="quota-5h-fill" class="quota-bar-fill"></div>
          </div>
          <span id="quota-5h-pct" class="quota-bar-pct">0%</span>
        </div>
        <div class="quota-bar-row">
          <span class="quota-bar-label">7D</span>
          <div class="quota-bar-track">
            <div id="quota-7d-fill" class="quota-bar-fill"></div>
          </div>
          <span id="quota-7d-pct" class="quota-bar-pct">0%</span>
        </div>
      </div>
    </div>

    <!-- Agent list -->
    <div class="agent-list-wrap" id="agent-list-wrap">
      <div class="empty-wrap" id="empty-state">
        <span class="empty-text">No agents</span>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <button class="open-dashboard-btn" id="open-dashboard-btn">
        Open Dashboard
        <span class="btn-arrow">↗</span>
      </button>
    </div>

  </div>

  <script>
    const WS_URL = 'ws://localhost:4000';
    const RECONNECT_INTERVAL = 3000;

    let ws = null;
    let reconnectTimer = null;
    let isOnline = false;
    let lastAgentsSignature = '';
    let lastQuotaSignature = '';
    const els = {
      agentListWrap: document.getElementById('agent-list-wrap'),
      workingCount: document.getElementById('working-count'),
      idleCount: document.getElementById('idle-count'),
      totalTokens: document.getElementById('total-tokens'),
      totalCost: document.getElementById('total-cost'),
      quotaTier: document.getElementById('quota-tier'),
      quotaActivity: document.getElementById('quota-activity'),
      quotaBars: document.getElementById('quota-bars'),
      openDashboardBtn: document.getElementById('open-dashboard-btn'),
    };
    const quotaEls = {
      fill5h: document.getElementById('quota-5h-fill'),
      pct5h: document.getElementById('quota-5h-pct'),
      fill7d: document.getElementById('quota-7d-fill'),
      pct7d: document.getElementById('quota-7d-pct'),
    };

    // ── Utilities ──────────────────────────────────────────────
    function formatTokens(n) {
      const num = Number(n);
      if (!Number.isFinite(num)) return '0';
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
      return String(Math.round(num));
    }

    function formatCost(n) {
      const num = Number(n);
      return '$' + (Number.isFinite(num) ? num.toFixed(2) : '0.00');
    }

    function toNumber(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    }

    function normalizeTokenUsage(raw) {
      if (!raw || typeof raw !== 'object') {
        return {
          input: 0,
          output: 0,
          cacheRead: 0,
          cacheCreate: 0,
          totalInput: 0,
          totalOutput: 0,
        };
      }

      return {
        input: toNumber(
          raw.input ??
          raw.totalInput ??
          raw.total_input ??
          raw.input_tokens ??
          raw.inputTokens ??
          raw.prompt_tokens ??
          raw.promptTokens ??
          raw.total_input_tokens
        ),
        output: toNumber(
          raw.output ??
          raw.totalOutput ??
          raw.total_output ??
          raw.output_tokens ??
          raw.outputTokens ??
          raw.completion_tokens ??
          raw.completionTokens ??
          raw.total_output_tokens
        ),
        cacheRead: toNumber(
          raw.cacheRead ??
          raw.cache_read ??
          raw.cached_input_tokens ??
          raw.cache_read_input_tokens ??
          raw.cacheReadInputTokens
        ),
        cacheCreate: toNumber(
          raw.cacheCreate ??
          raw.cache_create_tokens ??
          raw.cacheCreateTokens ??
          raw.cacheWrite ??
          raw.cache_write ??
          raw.cache_creation_input_tokens
        ),
        totalInput: toNumber(raw.totalInput ?? raw.total_input ?? raw.input),
        totalOutput: toNumber(raw.totalOutput ?? raw.total_output ?? raw.output),
      };
    }

    const CLAUDE_RATES = [
      { match: 'opus', input: 15, output: 75, cacheRead: 1.5, cacheCreate: 18.75 },
      { match: 'sonnet', input: 3, output: 15, cacheRead: 0.3, cacheCreate: 3.75 },
      { match: 'haiku', input: 0.8, output: 4, cacheRead: 0.08, cacheCreate: 1 },
    ];

    const OPEN_AI_RATES = [
      { match: 'gpt-5.5', input: 15, output: 120, cacheRead: 1.5, cacheCreate: 0 },
      { match: 'gpt-5.4', input: 10, output: 80, cacheRead: 1, cacheCreate: 0 },
      { match: 'gpt-5.3', input: 5, output: 40, cacheRead: 0.5, cacheCreate: 0 },
      { match: 'gpt-5', input: 1.25, output: 10, cacheRead: 0.125, cacheCreate: 0 },
    ];

    function pricingForModel(model, provider) {
      const normalizedModel = String(model || '').toLowerCase();
      const normalizedProvider = String(provider || '').toLowerCase();
      const table = normalizedProvider === 'codex' || normalizedModel.includes('gpt')
        ? OPEN_AI_RATES
        : CLAUDE_RATES;
      return table.find((entry) => normalizedModel.includes(entry.match)) ||
        (table === OPEN_AI_RATES
          ? { input: 1.25, output: 10, cacheRead: 0.125, cacheCreate: 0 }
          : { input: 3, output: 15, cacheRead: 0.3, cacheCreate: 3.75 });
    }

    function estimateTokenCost(rawUsage, model, provider) {
      const usage = normalizeTokenUsage(rawUsage);
      const rates = pricingForModel(model, provider);
      return (
        usage.totalInput * rates.input +
        usage.totalOutput * rates.output +
        usage.cacheRead * rates.cacheRead +
        usage.cacheCreate * rates.cacheCreate
      ) / 1000000;
    }

    function normalizeStatus(status) {
      const normalized = String(status || 'idle').trim().toLowerCase();
      if (normalized === 'active') return 'working';
      if (normalized === 'working') return 'working';
      if (normalized === 'waiting') return 'waiting';
      return normalized === 'idle' ? 'idle' : 'idle';
    }

    function getStatusLabel(status) {
      const normalized = normalizeStatus(status);
      const map = {
        working: 'Working...',
        idle: 'Idle',
        waiting: 'Waiting...',
      };
      return map[normalized] || 'Idle';
    }

    function normalizeReasoningEffort(effort) {
      const normalized = String(effort || '').toLowerCase();
      if (!normalized || normalized === 'none') return normalized ? 'none' : null;
      if (normalized.includes('xhigh') || normalized.includes('extra')) return 'xhigh';
      if (normalized.includes('high')) return 'high';
      if (normalized.includes('medium')) return 'medium';
      if (normalized.includes('low')) return 'low';
      return normalized;
    }

    function getModelIdentity(model, effort, provider) {
      const normalizedModel = String(model || '').toLowerCase().replace(/[._]/g, '-').replace(/\s+/g, '-');
      const normalizedProvider = String(provider || '').toLowerCase();
      const effortTier = normalizeReasoningEffort(effort);
      if (normalizedModel.includes('gpt-5-3-codex-spark')) {
        return { label: '5.3 Spark', effortTier, color: '#f8e36f' };
      }
      if (normalizedModel.includes('gpt-5-5')) {
        return { label: '5.5', effortTier, color: '#fff1b8' };
      }
      if (normalizedProvider.includes('codex') || normalizedModel.includes('codex') || normalizedModel.includes('gpt')) {
        return { label: model || 'Codex', effortTier, color: '#7be3d7' };
      }
      return { label: model || '?', effortTier, color: '#64748b' };
    }

    function getModelLabel(model, effort, provider) {
      const identity = getModelIdentity(model, effort, provider);
      const effortLabels = { low: 'low', medium: 'med', high: 'high', xhigh: 'xhigh' };
      const suffix = identity.effortTier && identity.effortTier !== 'none'
        ? ` ${effortLabels[identity.effortTier] || identity.effortTier}`
        : '';
      return `${identity.label}${suffix}`
        .replace('claude-', '')
        .replace(/-\d{8}$/, '');
    }

    // ── Badge update (Swift bridge) ───────────────────────
    function postBadge(working, total) {
      try {
        webkit.messageHandlers.badge.postMessage({ working, total });
      } catch (_) { /* Browser test environment */ }
    }

    // ── UI rendering ─────────────────────────────────────────
    function renderAgents(sessions) {
      const list = Array.isArray(sessions) ? [...sessions] : [];
      const wrap = els.agentListWrap;

      if (!isOnline) {
        wrap.innerHTML = `
          <div class="offline-wrap">
            <div class="offline-icon">⚡</div>
            <div class="offline-text">SERVER OFFLINE</div>
            <div class="offline-retry">Reconnecting...</div>
          </div>`;
        els.workingCount.textContent = '0';
        els.idleCount.textContent = '0';
        els.totalTokens.textContent = '0 tokens';
        els.totalCost.textContent = '$0.00';
        clearQuota();
        postBadge(0, 0);
        return;
      }

      if (!list.length) {
        const signature = 'empty|0';
        if (signature === lastAgentsSignature) return;
        lastAgentsSignature = signature;

        wrap.innerHTML = `
          <div class="empty-wrap">
            <span class="empty-text">No agents</span>
          </div>`;
        els.workingCount.textContent = '0';
        els.idleCount.textContent = '0';
        els.totalTokens.textContent = '0 tokens';
        els.totalCost.textContent = '$0.00';
        clearQuota();
        postBadge(0, list.length);
        return;
      }

      // Stats
      let workingCount = 0;
      let idleCount = 0;
      let totalTokens = 0;
      let totalCost = 0;
      const summary = [];
      const sorted = list.sort((a, b) => {
        const order = { working: 0, waiting: 1, idle: 2 };
        return (order[normalizeStatus(a.status)] ?? 9) - (order[normalizeStatus(b.status)] ?? 9);
      });

      sorted.forEach(s => {
        const status = normalizeStatus(s.status);
        const isWorking = status === 'working';
        if (isWorking) workingCount++;
        else idleCount++;
        const tokenSource = s.tokenUsage || s.tokens || s.usage;
        const estimatedCost = Number(s.estimatedCost);
        const cost = Number.isFinite(estimatedCost) ? estimatedCost : estimateTokenCost(tokenSource, s.model, s.provider);
        const tokenUsage = normalizeTokenUsage(tokenSource);
        const sessionTokens = tokenUsage.input + tokenUsage.output + tokenUsage.cacheRead + tokenUsage.cacheCreate;
        totalTokens += sessionTokens;
        totalCost += cost;
        summary.push({
          id: s.sessionId || s.id || '',
          status,
          model: getModelLabel(s.model, s.reasoningEffort || s.effort, s.provider),
          modelColor: getModelIdentity(s.model, s.reasoningEffort || s.effort, s.provider).color,
          activity: getStatusLabel(status),
          tokens: sessionTokens,
          cost,
          displayName: s.name || s.sessionId?.slice(0, 8) || 'Unknown',
        });
      });

      const signature = `${sorted.length}|${workingCount}|${idleCount}|${totalTokens}|${totalCost.toFixed(6)}|` +
        summary.map(item => `${item.id}|${item.status}|${item.model}|${item.modelColor}|${item.tokens}|${item.cost.toFixed(6)}`).join('|');
      if (signature === lastAgentsSignature) return;
      lastAgentsSignature = signature;

      els.workingCount.textContent = workingCount;
      els.idleCount.textContent = idleCount;
      els.totalTokens.textContent = formatTokens(totalTokens) + ' tokens';
      els.totalCost.textContent = formatCost(totalCost);

      postBadge(workingCount, list.length);

      // Render list
      const items = summary
        .map(s => {
          const statusClass = s.status || 'idle';
          return `
            <div class="agent-item">
              <span class="agent-dot ${statusClass}"></span>
              <div class="agent-info">
                <div class="agent-name">${escHtml(s.displayName)}</div>
                <div class="agent-activity">${escHtml(s.activity)}</div>
              </div>
              <span class="agent-model" style="color:${escHtml(s.modelColor)}">${escHtml(s.model)}</span>
            </div>`;
        })
        .join('');

      wrap.innerHTML = items;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Quota rendering ──────────────────────────────────────
    function renderQuota(usage) {
      const hasUsage = usage && typeof usage === 'object';
      if (!hasUsage) {
        clearQuota();
        return;
      }
      const quotaPayload = usage.quota || {};
      const today = usage.activity && usage.activity.today ? usage.activity.today : {};
      const signature = [
        !!usage.quotaAvailable,
        usage.account?.rateLimitTier || '',
        usage.account?.subscriptionType || '',
        today.messages || 0,
        today.sessions || 0,
        quotaPayload.fiveHour || 0,
        quotaPayload.sevenDay || 0,
      ].join('|');
      if (signature === lastQuotaSignature) return;
      lastQuotaSignature = signature;

      const tierEl = els.quotaTier;
      const activityEl = els.quotaActivity;

      if (usage.account) {
        tierEl.textContent = formatTier(usage.account.rateLimitTier, usage.account.subscriptionType);
      } else {
        tierEl.textContent = '';
      }

      if (usage.activity && usage.activity.today) {
        const t = usage.activity.today;
        activityEl.textContent = formatTokens(t.messages) + ' msgs / ' + t.sessions + ' sessions';
      } else {
        activityEl.textContent = '--';
      }

      const barsEl = els.quotaBars;
      if (usage.quotaAvailable && usage.quota) {
        barsEl.style.display = 'flex';
        const fiveHour = toNumber(usage.quota.fiveHour);
        const sevenDay = toNumber(usage.quota.sevenDay);
        updateQuotaBar('quota-5h-fill', 'quota-5h-pct', fiveHour > 1 ? fiveHour / 100 : fiveHour);
        updateQuotaBar('quota-7d-fill', 'quota-7d-pct', sevenDay > 1 ? sevenDay / 100 : sevenDay);
      } else {
        barsEl.style.display = 'none';
        updateQuotaBar('quota-5h-fill', 'quota-5h-pct', 0);
        updateQuotaBar('quota-7d-fill', 'quota-7d-pct', 0);
      }
    }

    function formatTier(rateLimitTier, subscriptionType) {
      if (rateLimitTier) {
        const match = rateLimitTier.match(/max_(\d+x)/i);
        if (match) return 'Max ' + match[1];
      }
      if (subscriptionType) {
        return subscriptionType.charAt(0).toUpperCase() + subscriptionType.slice(1);
      }
      return 'Free';
    }

    function updateQuotaBar(fillId, pctId, value) {
      const pct = Math.max(0, Math.min(100, Math.round(toNumber(value) * 100)));
      const fillEl = fillId === 'quota-5h-fill' ? quotaEls.fill5h : quotaEls.fill7d;
      const pctEl = pctId === 'quota-5h-pct' ? quotaEls.pct5h : quotaEls.pct7d;
      fillEl.style.width = pct + '%';
      pctEl.textContent = pct + '%';
      fillEl.className = 'quota-bar-fill';
      if (pct >= 80) fillEl.classList.add('quota-bar-fill--danger');
      else if (pct >= 50) fillEl.classList.add('quota-bar-fill--warn');
    }

    function clearQuota() {
      els.quotaTier.textContent = 'Unavailable';
      els.quotaActivity.textContent = '--';
      els.quotaBars.style.display = 'none';
      updateQuotaBar('quota-5h-fill', 'quota-5h-pct', 0);
      updateQuotaBar('quota-7d-fill', 'quota-7d-pct', 0);
      lastQuotaSignature = '';
    }

    // ── WebSocket ─────────────────────────────────────────
    function connect() {
      if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;

      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        isOnline = true;
        clearTimeout(reconnectTimer);
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'init' || data.type === 'update') {
            renderAgents(data.sessions || []);
            renderQuota(data.usage);
          }
        } catch (e) {
          console.error('WS parse error', e);
        }
      };

      ws.onclose = () => {
        isOnline = false;
        renderAgents([]);
        renderQuota();
        scheduleReconnect();
      };

      ws.onerror = () => {
        isOnline = false;
        renderAgents([]);
        renderQuota();
        ws.close();
      };
    }

    function scheduleReconnect() {
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connect, RECONNECT_INTERVAL);
    }

    // ── Open Dashboard ────────────────────────────────────
    els.openDashboardBtn.addEventListener('click', () => {
      try {
        webkit.messageHandlers.openDashboard.postMessage({});
      } catch (_) {
        // Browser test environment: open in a new tab
        window.open('http://localhost:4000', '_blank');
      }
    });

    // ── Initialization ────────────────────────────────────────────
    connect();
  </script>
</body>
</html>
